title: "Seungeon Lee"
tagline: "AI Drug Discovery Researcher"
description: "Seungeon Lee's portfolio site — AI-driven medium-sized peptide drug discovery"
timezone: Asia/Tokyo
url: "https://flansma.github.io"
baseurl: ""
permalink: pretty
lang: en

# --- jekyll-seo-tag inputs ---
# Social links are sourced from _data/profile.yml (single source of truth).
# Custom Person JSON-LD on the homepage emits the rich sameAs list.
author:
  name: "Seungeon Lee"
  twitter: flansma
  email: lee.seungeon.62y@st.kyoto-u.ac.jp
twitter:
  username: flansma
  card: summary_large_image
logo: /assets/img/face.jpg

# --- Plugins (all preinstalled on GitHub Pages) ---
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Default layouts per scope — auto-applies layout based on collection type.
# This means new content files don't need a `layout:` line in their front matter.
defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/img/talks/cbi2025-oral.png
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: publications
    values:
      layout: publication
  - scope:
      path: ""
      type: preprints
    values:
      layout: preprint

# Prevent macOS metadata from being processed
exclude:
  - .DS_Store
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - _templates

# Collections for itemized content
collections:
  publications:
    output: true
    sort_by: date
    order: descending
    permalink: /publications/:name/
  preprints:
    output: true
    sort_by: date
    order: descending
    permalink: /preprints/:name/
  talks:
    output: true
    sort_by: date
    order: descending
    permalink: /talks/:name/
  awards:
    output: false
    sort_by: date
    order: descending
  writings:
    output: false
    sort_by: date
    order: descending
  projects:
    output: true
    sort_by: date
    order: descending
    permalink: /projects/:name/

markdown: kramdown
theme: null
