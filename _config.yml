title: "Seungeon Lee"
tagline: "AI Drug Discovery Researcher"
description: "Seungeon Lee's portfolio site — AI-driven medium-sized peptide drug discovery"
timezone: Asia/Tokyo
url: "https://flansma.github.io"
baseurl: ""
permalink: pretty
lang: en

# --- jekyll-seo-tag inputs ---
# Social links are sourced from _data/profile.yml (single source of truth).
# Custom Person JSON-LD on the homepage emits the rich sameAs list.
author:
  name: "Seungeon Lee"
  twitter: flansma
  email: lee.seungeon.62y@st.kyoto-u.ac.jp
twitter:
  username: flansma
  card: summary_large_image
logo: /assets/img/face.png

# --- Plugins (all preinstalled on GitHub Pages) ---
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Default layout
defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/img/face.png

# Prevent macOS metadata from being processed
exclude:
  - .DS_Store
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - _templates

# Collections for itemized content
collections:
  publications:
    output: false
    sort_by: date
    order: descending
  preprints:
    output: false
    sort_by: date
    order: descending
  talks:
    output: true
    sort_by: date
    order: descending
    permalink: /talks/:name/
  awards:
    output: false
    sort_by: date
    order: descending
  projects:
    output: true
    sort_by: date
    order: descending
    permalink: /projects/:name/

markdown: kramdown
theme: null
