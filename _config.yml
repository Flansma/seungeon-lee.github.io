title: "Seungeon Lee"
description: "Seungeon Lee's portfolio site — AI-driven medium-sized peptide drug discovery"
timezone: Asia/Tokyo
url: "https://flansma.github.io"
baseurl: ""
permalink: pretty

# Default layout
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Prevent macOS metadata from being processed
exclude:
  - .DS_Store
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - _templates

# Collections for itemized content
collections:
  publications:
    output: false
    sort_by: date
    order: descending
  preprints:
    output: false
    sort_by: date
    order: descending
  talks:
    output: true
    sort_by: date
    order: descending
    permalink: /talks/:name/
  awards:
    output: false
    sort_by: date
    order: descending
  projects:
    output: true
    sort_by: date
    order: descending
    permalink: /projects/:name/

markdown: kramdown
theme: null
