{% comment %} jekyll-seo-tag handles: title, description, canonical, og:*, twitter:*, basic JSON-LD {% endcomment %}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
{% seo %}
<meta name="theme-color" content="#1a1a2e">
<meta name="color-scheme" content="light dark">

<link rel="icon" href="{{ '/assets/img/favicon.svg' | relative_url }}" type="image/svg+xml">
<link rel="apple-touch-icon" href="{{ '/assets/img/face.jpg' | relative_url }}">
<link rel="manifest" href="{{ '/manifest.webmanifest' | relative_url }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }} Feed" href="{{ '/feed.xml' | absolute_url }}">

{% include citation_meta.html %}
{% include article_meta.html %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="image" href="{{ '/assets/img/face.jpg' | relative_url }}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet">
<link href="{{ '/assets/css/style.css' | relative_url }}" media="all" rel="stylesheet" type="text/css">
<script src="{{ '/assets/js/i18n.js' | relative_url }}" defer></script>
{% include jsonld.html %}
