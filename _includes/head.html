<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page.title | default: site.title }}</title>
<meta property='og:type' content='website'>
<meta property='og:title' content='{{ page.title | default: site.title }}'>
<meta property='og:description' content='{{ page.description | default: site.description }}'>
<meta name="theme-color" content="#1a1a2e">
<meta name="color-scheme" content="light dark">
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/img/face.png">
<meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:creator" content="@flansma">
<link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
<link rel="icon" href="{{ site.baseurl }}/assets/img/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/img/face.png">
<meta name="description" content="{{ page.description | default: site.description }}" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet">
<link href="{{ site.baseurl }}/assets/css/style.css" media="all" rel="stylesheet" type="text/css" />
<script src="{{ site.baseurl }}/assets/js/i18n.js" defer></script>
