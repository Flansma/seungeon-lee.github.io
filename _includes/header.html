<header class="header">
  <div class="container">
    <!-- Left: Logo + Affiliation -->
    {% assign aff = site.data.profile.affiliation %}
    <div class="header-brand">
      <a href="{{ aff.url }}" class="header-logo" target="_blank" rel="noopener" aria-label="Okuno Laboratory website">
        <img src="{{ '/assets/img/E-W.png' | relative_url }}" alt="Okuno Lab" width="500" height="500" loading="lazy" decoding="async">
      </a>
      <div class="header-affiliation">
        <span class="affiliation-short" data-lang-en="{{ aff.short.en }}" data-lang-ja="{{ aff.short.ja }}" data-lang-ko="{{ aff.short.ko }}">{{ aff.short.ja }}</span>
        <span class="affiliation-line1" data-lang-en="{{ aff.lines[0].en }}" data-lang-ja="{{ aff.lines[0].ja }}" data-lang-ko="{{ aff.lines[0].ko }}">{{ aff.lines[0].ja }}</span>
        <span class="affiliation-line2" data-lang-en="{{ aff.lines[1].en }}" data-lang-ja="{{ aff.lines[1].ja }}" data-lang-ko="{{ aff.lines[1].ko }}">{{ aff.lines[1].ja }}</span>
      </div>
    </div>

    <!-- Center: Navigation -->
    <nav class="gnav" id="gnav">
      <ul class="gnav-list">
        {% for nav in site.data.navigation %}
        <li class="gnav-item"><a href="#{{ nav.id }}">{{ nav.label }}</a></li>
        {% endfor %}
      </ul>
      <div class="gnav-lang-switch lang-switch" role="group" aria-label="Language">
        <button type="button" data-lang="en" aria-label="English" onclick="setLang('en')">EN</button>
        <button type="button" data-lang="ja" aria-label="日本語" onclick="setLang('ja')">JA</button>
        <button type="button" data-lang="ko" aria-label="한국어" onclick="setLang('ko')">KO</button>
      </div>
    </nav>

    <!-- Right: Lang + Theme + Menu -->
    <div class="header-actions">
      <div class="lang-switch" role="group" aria-label="Language">
        <button type="button" data-lang="en" aria-label="English" onclick="setLang('en')">EN</button>
        <button type="button" data-lang="ja" aria-label="日本語" onclick="setLang('ja')">JA</button>
        <button type="button" data-lang="ko" aria-label="한국어" onclick="setLang('ko')">KO</button>
      </div>
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <span class="material-icons-outlined icon-light">light_mode</span>
        <span class="material-icons-outlined icon-dark">dark_mode</span>
      </button>
      <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span class="menu-icon"></span>
      </button>
    </div>
  </div>
</header>
